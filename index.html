<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <title>монета</title>
  </head>

  <body>
    <div class="container">
      <h1 class="title">калькулятор денег</h1>
  
      <section class="balance">
        <h2 class="balance-title">мой баланс</h2>
  
        <div class="balance-income">
          <h3 class="balance-income__title">получено</h3>
        </div>
  
        <div class="balance-excome">
          <h3 class="balance-excome__title">потрачено</h3>
        </div>
      </section>
  
      <section class="add-transaktion">
          <h2 class="add-transaktion__title">транзакция</h2>
          <form action="">
           <div class="transaktion-name">
              <label for="name">за что получил 💵/ на что потратил 💵</label>
                <input class="transaktion-input transaktion-name__input" type="text" id="name" placeholder="Например: Такси или Премия"/>
           </div>
           <div class="transaktion-money">
             <label for="money">сколько 💵</label>
                <input class="transaktion-input transaktion-money__money" type="number" id="money" placeholder="+ для доходов, - для расходов."/>
           </div>
              <button class="transaktion-button" type="submit">добавить транзакцию</button>
          </form>
        </section>
  
        <section class="history">
          <h2 class="history-title">история</h2>
        </section>
    </div>
  </body>
</html>
